name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Tests
        env:
          API_KEYS: "test-key-123"
          DEFAULT_CSV_PATH: "data/Simulation_Data.csv"
          MODEL_CACHE_DIR: "./model_cache"
        run: |
          python -m pytest tests/ -v

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      # No checkout/build step here — the build happens directly on the VPS
      # after pulling the latest code, so the image always reflects whatever
      # is on disk on the VPS at build time (including backend/data/Simulation_Data.csv
      # if it's committed to the repo — see CI_CD_SETUP.md for the data-in-image caveat).
      - name: SSH into VPS and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            echo "==> Pulling latest code"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"

            echo "==> Rebuilding and restarting the container"
            docker compose up -d --build

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "==> Deploy finished"
            docker compose ps